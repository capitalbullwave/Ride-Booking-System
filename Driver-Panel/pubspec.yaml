name: wavego_driver
description: Fast Bull Captain - Production-ready ride-hailing driver application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.4

  # Firebase & Notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Media & Permissions
  image_picker: ^1.1.2
  cross_file: ^0.3.4+2
  camera: ^0.11.1
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  image: ^4.5.4
  cached_network_image: ^3.4.1

  # UI & Animations
  lottie: ^3.3.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.2
  country_picker: ^2.0.27
  pin_code_fields: ^8.0.1
  fl_chart: ^0.70.2
  qr_flutter: ^4.1.0

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/mock/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
